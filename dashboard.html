function achv(actual,target){ if(!target) return ''; const p=Math.round(actual/target*100);
  const cls = p>=100?'up':'down'; return '<span class="badge '+cls+'">'+p+'% of target</span>'; }

function card(lbl,val,sub,cls){ return '<div class="card '+(cls||'')+'"><div class="lbl">'+lbl+'</div>'+
  '<div class="val">'+val+'</div>'+(sub?'<div class="vsub">'+sub+'</div>':'')+'</div>'; }

function kpiCards(c){
  const k=c.kpi, g=c.group, out=[];
  if(g==='OTHER'){ // Krea: meta+google split
    out.push(card('Total Amount (incl GST)', INR(k.total_incl), 'Excl GST <span class="g">'+INR(k.spent_excl)+'</span> &middot; GST <span class="b">'+INR(k.gst)+'</span>'));
    out.push(card('Meta Spent (incl GST)', INR(k.meta_spent+k.meta_gst), 'Excl GST <span class="g">'+INR(k.meta_spent)+'</span> &middot; GST <span class="b">'+INR(k.meta_gst)+'</span>','blue'));
    out.push(card('Google Spent (incl GST)', INR(k.google_spent+k.google_gst), 'Excl GST <span class="g">'+INR(k.google_spent)+'</span> &middot; GST <span class="b">'+INR(k.google_gst)+'</span>','blue'));
    out.push(card('CRM Leads', NUM(k.actual_leads), 'Meta <span class="g">'+NUM(k.meta_leads)+'</span> &middot; Google <span class="g">'+NUM(k.google_leads)+'</span> &middot; Target '+NUM(k.target_leads)+'<br>'+achv(k.actual_leads,k.target_leads),'violet'));
    out.push(card('Cost per Lead', INR(k.actual_cpl), 'Target '+(k.target_cpl?INR(k.target_cpl):'&mdash;'),'amber'));
    out.push(card('Paid Applications', NUM(k.paid_app), 'Target '+NUM(k.target_app)+'<br>'+achv(k.paid_app,k.target_app),'red'));
    if(k.untouched!=null) out.push(card('Untouched Leads', NUM(k.untouched), 'Awaiting first contact','red'));
  } else if(g==='KARUNYA'){
    out.push(card('Google Spent (incl GST)', INR(k.total_incl), 'Excl GST <span class="g">'+INR(k.spent_excl)+'</span> &middot; GST <span class="b">'+INR(k.gst)+'</span>'));
    out.push(card('Google Leads', NUM(k.actual_leads), 'Target '+NUM(k.target_leads)+'<br>'+achv(k.actual_leads,k.target_leads),'violet'));
    out.push(card('Cost per Lead', INR(k.actual_cpl), 'Target '+(k.target_cpl?INR(k.target_cpl):'&mdash;'),'amber'));
  } else { // SRM
    out.push(card('Amount Spent (incl GST)', INR(k.total_incl), 'Excl GST <span class="g">'+INR(k.spent_excl)+'</span> &middot; GST <span class="b">'+INR(k.gst)+'</span>'));
    out.push(card('CRM Leads (Google)', NUM(k.actual_leads), 'Target '+NUM(k.target_leads)+' &middot; CRM '+NUM(k.crm_leads)+'<br>'+achv(k.actual_leads,k.target_leads),'violet'));
    out.push(card('Cost per Lead', INR(k.actual_cpl), 'Target '+(k.target_cpl?INR(k.target_cpl):'&mdash;'),'amber'));
    out.push(card('Paid Applications', NUM(k.paid_app), 'Target '+NUM(k.target_app)+'<br>'+achv(k.paid_app,k.target_app),'red'));
    if(k.untouched!=null) out.push(card('Untouched Leads', NUM(k.untouched), 'Awaiting first contact','red'));
  }
  return '<div class="cards">'+out.join('')+'</div>';
}

function lineCfg(labels,sets,yLabel,money){
  return {type:'line',data:{labels:labels,datasets:sets},options:{responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{color:'#334155',usePointStyle:true,boxWidth:8,font:{size:12}}},
      tooltip:{callbacks: money?{label:c=>c.dataset.label+': \u20b9'+Math.round(c.parsed.y).toLocaleString('en-IN')}:{}}},
    scales:{x:{ticks:{color:'#64748b',maxRotation:0,autoSkip:true,font:{size:11}},grid:{color:'rgba(15,23,42,.08)'}},
      y:{ticks:{color:'#64748b',font:{size:11}},grid:{color:'rgba(15,23,42,.08)'},title:{display:!!yLabel,text:yLabel,color:'#64748b'}}}}};
}
function ds(label,arr,color,dash){ return {label:label,data:arr,borderColor:color,backgroundColor:color+'22',
  borderWidth:2,borderDash:dash||[],tension:.3,pointRadius:2.5,pointHoverRadius:5,fill:false,spanGaps:true}; }

function renderCharts(c){
  const s=c.series, labels=s.map(x=>x.date);
  // Lead stage: clean ranked horizontal bars with value + % labels
  if(c.lead_stage){
    const ls=c.lead_stage;
    const ctx=document.getElementById('ls_'+c.key.replace(/\W/g,''));
    if(ctx){
      const n=ls.labels.length;
      const catcol={pos:'#0d9488',neu:'#94a3b8',neg:'#ef4444'};
      const palette=ls.labels.map((_,i)=>catcol[(ls.cats&&ls.cats[i])||'neu']);
      const valuePlugin={id:'lsvalues',afterDatasetsDraw(chart){
        const ctx2=chart.ctx, meta=chart.getDatasetMeta(0);
        ctx2.save(); ctx2.font='600 11px Inter,sans-serif'; ctx2.fillStyle='#475569'; ctx2.textBaseline='middle'; ctx2.textAlign='left';
        meta.data.forEach((bar,i)=>{ const v=chart.data.datasets[0].data[i];
          ctx2.fillText(v.toLocaleString('en-IN')+'  ('+ls.pct[i]+'%)', bar.x+8, bar.y); });
        ctx2.restore(); }};
      charts.push(new Chart(ctx,{type:'bar',
        data:{labels:ls.labels,datasets:[{data:ls.leads,backgroundColor:palette,borderRadius:4,maxBarThickness:24}]},
        options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,layout:{padding:{right:62}},
          plugins:{legend:{display:false},
            tooltip:{callbacks:{label:cx=>' '+cx.parsed.x.toLocaleString('en-IN')+' leads ('+ls.pct[cx.dataIndex]+'%)'}}},
          scales:{x:{beginAtZero:true,ticks:{color:'#64748b',font:{size:11},precision:0},grid:{color:'rgba(15,23,42,.07)'}},
            y:{ticks:{color:'#334155',font:{size:11.5,weight:'600'}},grid:{display:false}}}}
        ,plugins:[valuePlugin]})); }
  }
  // Leads line
  const lc=document.getElementById('ld_'+c.key.replace(/\W/g,''));
  if(lc) charts.push(new Chart(lc, lineCfg(labels,[
      ds('Target Leads',s.map(x=>x.target_leads),'#64748b',[6,4]),
      ds('Actual Leads',s.map(x=>x.actual_leads),'#0d9488')],'Leads',false)));
  // CPL line
  const cc=document.getElementById('cpl_'+c.key.replace(/\W/g,''));
  if(cc){ const sets=[ds('Actual CPL',s.map(x=>x.actual_cpl),'#d97706')];
    if(s.some(x=>x.target_cpl!=null)) sets.unshift(ds('Target CPL',s.map(x=>x.target_cpl),'#64748b',[6,4]));
    charts.push(new Chart(cc, lineCfg(labels,sets,'\u20b9 / lead',true))); }
  // Paid app line
  const pc=document.getElementById('pa_'+c.key.replace(/\W/g,''));
  if(pc) charts.push(new Chart(pc, lineCfg(labels,[
      ds('Target Paid App',s.map(x=>x.target_app),'#64748b',[6,4]),
      ds('Actual Paid App',s.map(x=>x.paid_app),'#dc2626')],'Applications',false)));
}

function chartBoxes(c){
  const id=c.key.replace(/\W/g,''); const b=[];
  const hasPaid = c.series.some(x=>x.target_app>0||x.paid_app>0);
  if(c.lead_stage){

    const thin = n<=1;
    const h = Math.max(170, n*32 + 24);

  }
  b.push('<div class="chart-box"><h3>Target Leads vs Actual Leads</h3><div class="cwrap"><canvas id="ld_'+id+'"></canvas></div></div>');
  b.push('<div class="chart-box"><h3>Target CPL vs Actual CPL</h3><div class="cwrap"><canvas id="cpl_'+id+'"></canvas></div></div>');

}

function metStatus(c){
  const k=c.kpi; let met=0,appl=0; const d={};
  if(k.target_leads>0){ appl++; d.leads=(k.actual_leads>=k.target_leads); if(d.leads)met++; } else d.leads=null;
  if(k.target_cpl){ appl++; d.cpl=(k.actual_cpl!=null && k.actual_cpl<=k.target_cpl); if(d.cpl)met++; } else d.cpl=null;
  if(k.target_app>0){ appl++; d.paid=(k.paid_app>=k.target_app); if(d.paid)met++; } else d.paid=null;
  const status = (appl>0 && met===appl) ? 'ok' : (met===0 ? 'no' : 'mid');
  return {met,appl,d,status};
}

        const head=(c.locations.length>1)?(c.label+' &mdash; '+loc.name):c.label;
        camp+='<div style="font-weight:700;color:var(--head);font-size:13px;margin:16px 0 8px">'+head+' <span class="pill">'+loc.campaigns.length+' campaigns</span></div>';
        camp+='<table class="tbl"><thead><tr><th>Campaign</th><th>Spend</th><th>Leads vs Target</th><th>CPL vs Target</th><th>'+c.metric+' vs Target</th><th>Status</th></tr></thead><tbody>';
        loc.campaigns.forEach(cp=>{
          const sL=cp.target_leads?(cp.actual_leads>=cp.target_leads):null;
          const sC=cp.target_cpl?(cp.actual_cpl!=null && cp.actual_cpl<=cp.target_cpl):null;
          const sV=(cp.target_conv!=null && cp.target_conv>0)?(cp.actual_conv>=cp.target_conv):null;
          let met=0,appl=0; [sL,sC,sV].forEach(x=>{ if(x!==null){appl++; if(x)met++;} });
          const st=(appl>0&&met===appl)?'ok':(met===0?'no':'mid');
          const lp=cp.target_leads?' <span class="mini">('+Math.round(cp.actual_leads/cp.target_leads*100)+'%)</span>':'';
          const convCell=(cp.target_conv!=null)?('<span class="num">'+NUM(cp.actual_conv)+'</span> / '+NUM(cp.target_conv)+' '+flag(sV)):('<span class="num">'+NUM(cp.actual_conv)+'</span> <span class="mini">no target</span>');
          camp+='<tr><td class="cname">'+cp.name+'</td>'+
            '<td class="num">'+INR(cp.amount)+'</td>'+
            '<td><span class="num">'+NUM(cp.actual_leads)+'</span> / '+NUM(cp.target_leads)+lp+' '+flag(sL)+'</td>'+
            '<td><span class="num">'+INR(cp.actual_cpl)+'</span> / '+INR(cp.target_cpl)+' '+flag(sC)+'</td>'+
            '<td>'+convCell+'</td>'+
            '<td><span class="st '+st+'">'+(st==='ok'?'On Target':(st==='no'?'Below':'Mixed'))+'</span></td></tr>';
        });
        camp+='</tbody></table>';
      });
    });
  }
  document.getElementById('panel').innerHTML='<div class="panel-title">Key Insights &mdash; Target Achievement <span class="pill">'+avail.length+' campuses</span></div>'+ins+narr+t+camp;
}
let matrixSel={}; let curMatrixClient=null;
function pickLoc(i){ if(curMatrixClient){ matrixSel[curMatrixClient.key]=i; renderMatrix(curMatrixClient); } }
function matrixKpis(c,loc){
  const k=loc.kpi, out=[];
  out.push(card('Amount Spent (incl GST)', INR(k.total_incl), 'Meta <span class="g">'+INR(k.meta_incl)+'</span> &middot; Google <span class="g">'+INR(k.google_incl)+'</span><br>Excl GST '+INR(k.spent_excl)+' &middot; GST '+INR(k.gst)));
  out.push(card('Actual Leads vs Target', NUM(k.actual_leads)+' / '+NUM(k.target_leads), 'Meta <span class="g">'+NUM(k.meta_leads)+'</span> &middot; Google <span class="g">'+NUM(k.google_leads)+'</span><br>'+achv(k.actual_leads,k.target_leads),'violet'));
  out.push(card('Cost per Lead', INR(k.actual_cpl), 'Target '+INR(k.target_cpl),'amber'));
  out.push(card(c.metric+' vs Target', NUM(k.paid_app)+(k.target_app!=null?' / '+NUM(k.target_app):''), (k.target_app!=null?achv(k.paid_app,k.target_app):'<span class="mini">no target in sheet</span>'),'red'));
  if(c.has_consulted) out.push(card('Consulted', NUM(k.consulted), 'Patients consulted','blue'));
  return '<div class="cards">'+out.join('')+'</div>';
}
function matrixTable(c,loc){
  const m=c.metric;
  const cols=['Campaign','Amount Spent','Meta Spent','Google Spent','Target Leads','Actual Leads','Meta Leads','Google Leads','Target CPL','Actual CPL','Target '+m,'Actual '+m];
  if(c.has_consulted) cols.push('Consulted');
  const row=(name,d,tot)=>{
    let cells=['<td class="cn">'+name+'</td>','<td>'+INR(d.amount)+'</td>','<td>'+INR(d.meta_spent)+'</td>','<td>'+INR(d.google_spent)+'</td>',
      '<td>'+NUM(d.target_leads)+'</td>','<td>'+NUM(d.actual_leads)+'</td>','<td>'+NUM(d.meta_leads)+'</td>','<td>'+NUM(d.google_leads)+'</td>',
      '<td>'+INR(d.target_cpl)+'</td>','<td>'+INR(d.actual_cpl)+'</td>',
      '<td>'+(d.target_conv!=null?NUM(d.target_conv):'&mdash;')+'</td>','<td>'+(d.actual_conv!=null?NUM(d.actual_conv):'&mdash;')+'</td>'];
    if(c.has_consulted) cells.push('<td>'+(d.consulted!=null?NUM(d.consulted):'&mdash;')+'</td>');
    return '<tr'+(tot?' class="tot"':'')+'>'+cells.join('')+'</tr>';
  };
  let body=loc.campaigns.map(cp=>row(cp.name,cp,false)).join('');
  const k=loc.kpi;
  body+=row('Total',{amount:k.total_incl,meta_spent:k.meta_incl,google_spent:k.google_incl,target_leads:k.target_leads,actual_leads:k.actual_leads,meta_leads:k.meta_leads,google_leads:k.google_leads,target_cpl:k.target_cpl,actual_cpl:k.actual_cpl,target_conv:k.target_app,actual_conv:k.paid_app,consulted:k.consulted},true);
  return '<div class="chart-box full"><h3>Campaigns Analysis</h3><div class="mtxwrap"><table class="mtx"><thead><tr>'+cols.map(x=>'<th>'+x+'</th>').join('')+'</tr></thead><tbody>'+body+'</tbody></table></div></div>';
}
function dispSection(c,loc){
  const CC={Appointment:'appointment',Consulted:'consulted',Interested:'interested',Unreachable:'unreachable',Lost:'lost'};
  const B=['Appointment','Consulted','Interested','Unreachable','Lost'];
  const d=loc.disposition;
  const title='Lead Disposition &mdash; '+(c.disp_month||'June')+' (per camp)';
  if(!d){ if(c.disp_pending) return '<div class="chart-box full"><h3>'+title+'</h3><div class="note">SRM Diagnostics disposition is being prepared from its per-city CRM sheets.</div></div>'; return ''; }
  if(!d.available) return '<div class="chart-box full"><h3>'+title+'</h3><div class="note">'+(d.reason||'Not available')+'</div></div>';
  const legend='<div class="displeg">'+B.map(b=>'<span><i class="dispseg '+CC[b]+'"></i>'+b+'</span>').join('')+'</div>';
  const rows=d.camps.map(cp=>{
    const segs=B.map(b=>{ const v=cp[b]||0; return v>0?'<div class="dispseg '+CC[b]+'" style="flex:'+v+' 0 0" title="'+b+': '+v+'">'+(v>=2?v:'')+'</div>':''; }).join('');
    return '<div class="disprow"><div class="dispname">'+cp.name+' <span class="mini">('+cp.total+' leads)</span></div><div class="dispbar">'+segs+'</div></div>';
  }).join('');
  return '<div class="chart-box full"><h3>'+title+'</h3>'+legend+'<div class="disp">'+rows+'</div></div>';
}
function renderMatrix(c){
  charts.forEach(ch=>ch.destroy()); charts=[]; curMatrixClient=c;
  const li=matrixSel[c.key]||0; const loc=c.locations[li];
  let sub='';
  if(c.locations.length>1) sub='<div class="subtabs">'+c.locations.map((L,i)=>'<div class="subtab'+(i===li?' active':'')+'" onclick="pickLoc('+i+')">'+L.name+'</div>').join('')+'</div>';
  document.getElementById('panel').innerHTML='<div class="panel-title">'+c.label+' <span class="pill">Meta + Google</span><span class="pill">'+(c.locations.length>1?c.locations.length+' locations':'campaign view')+'</span></div>'+sub+matrixKpis(c,loc)+matrixTable(c,loc);
}
function show(idx){
  charts.forEach(ch=>ch.destroy()); charts=[];
  const avail = DATA.colleges.filter(c=>c.available);
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const tabEl=document.getElementById('tab'+idx); if(tabEl) tabEl.classList.add('active');
  const c=avail[idx];
  if(c.group==='MATRIX'){ renderMatrix(c); return; }
  let chTag = '';
  if(c.group==='OTHER') chTag='Meta + Google';
  else if(c.group==='KARUNYA') chTag='Google only';
  else chTag='Google';
  const p=document.getElementById('panel');
  const rev = c.needs_review ? '<span class="pill" style="background:#3a2a12;color:#f0a93b;border-color:#5a4420">needs review</span>' : '';
  p.innerHTML = '<div class="panel-title">'+c.label+' <span class="pill">'+chTag+'</span>'+
    '<span class="pill">'+c.series.length+' active days</span>'+rev+'</div>'+
    kpiCards(c)+ chartBoxes(c);
  renderCharts(c);
}

function init(){
  const tabs=document.getElementById('tabs');
  const avail=DATA.colleges.filter(c=>c.available);
  let ai=0;
  if(avail.length){ const ovt=document.createElement('div'); ovt.className='tab'; ovt.id='tabovw';
    ovt.textContent='★ Key Insights'; ovt.onclick=showOverview; tabs.appendChild(ovt); }
  DATA.colleges.forEach(c=>{
    const t=document.createElement('div');
    if(c.available){ const idx=ai++; t.className='tab'; t.id='tab'+idx;
      t.textContent=c.label; t.onclick=()=>show(idx); }
    else { t.className='tab disabled';
      const st=(c.reason&&c.reason.indexOf('sync')>=0)?'syncing':'no data';
      t.innerHTML=c.label+' &middot; <span style="font-size:10px">'+st+'…</span>'; }
    tabs.appendChild(t);
  });
  document.getElementById('srccount').textContent = avail.length+' of '+DATA.colleges.length+' clients loaded';
  if(avail.length){ showOverview(); } else { document.getElementById('panel').innerHTML='<div class="note">No client data available yet.</div>'; }
}
init();
</script></body></html>
